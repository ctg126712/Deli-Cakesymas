<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Deli Cakesymas - Bakery Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Inter:wght@300;400;600&display=swap');
        .header-font { font-family: 'Dancing Script', cursive; }
        .body-font { font-family: 'Inter', sans-serif; }
        #app { width: 100%; max-width: 600px; margin: 0 auto; background: white; padding: 20px; }
        button, select, input { min-height: 48px; display: block; width: 100%; }
        /* Reset button heights for smaller utility buttons */
        .pay-btn { min-height: 40px; }
        .util-btn { min-height: 24px; width: auto; display: inline-block; margin-bottom: 2px; }

        label { font-size: 10px; font-weight: bold; color: #78716c; text-transform: uppercase; margin-bottom: 2px; }
        
        /* Optimized for PDF generation */
        @media print { 
            .no-print { display: none !important; }
            .print-page { page-break-before: always; }
            #receipt-view { display: block !important; padding: 20px; }
            #app { box-shadow: none; width: 100%; }
            body { background: white; }
        }
    </style>
</head>
<body class="bg-stone-100 body-font">
    <div id="app">
        <!-- Input Mode -->
        <div id="input-view" class="no-print">
            <div class="flex justify-between items-center mb-4 border-b-2 border-pink-200 pb-2">
                <h1 class="text-2xl header-font text-stone-800">Creador de Pedidos</h1>
                <div class="flex gap-1">
                    <button onclick="saveOrder()" class="util-btn text-[9px] bg-stone-100 px-2 py-1 rounded">GUARDAR</button>
                    <select id="load-select" onchange="loadOrder()" class="util-btn text-[9px] bg-stone-100 px-1 rounded"></select>
                </div>
            </div>

            <div class="space-y-3 mb-6">
                <input type="text" id="comp-name" value="Deli Cakesymas" class="w-full text-center header-font text-xl border-none outline-none">
                
                <label>Nombre del Cliente</label>
                <input type="text" id="cust-name" class="w-full p-3 border rounded bg-stone-50">
                
                <label>Teléfono</label>
                <input type="text" id="cust-phone" class="w-full p-3 border rounded bg-stone-50">
                
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label>Fecha de Orden</label>
                        <input type="date" id="order-date" class="p-3 border rounded bg-stone-50">
                    </div>
                    <button type="button" onclick="document.getElementById('order-date').valueAsDate = new Date()" class="mt-4 bg-pink-100 text-pink-700 font-bold rounded uppercase text-[10px]">Hoy</button>
                </div>
                
                <label>Fecha de Entrega</label>
                <input type="date" id="delivery-date" class="w-full p-3 border rounded bg-stone-50">
                
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label>Gastos Indirectos ($)</label>
                        <input type="number" id="overhead" class="p-3 border rounded bg-stone-50">
                    </div>
                    <div>
                        <label>Millas (0.725/milla)</label>
                        <input type="number" id="miles" class="p-3 border rounded bg-stone-50">
                    </div>
                </div>
            </div>

            <div id="items-list" class="space-y-4 mb-6"></div>
            
            <button type="button" onclick="addItem()" class="w-full py-4 bg-pink-100 text-pink-700 font-bold rounded mb-6 text-sm uppercase">+ Agregar Producto</button>
            <button onclick="generateReceipt()" class="w-full bg-pink-500 text-white py-4 rounded font-bold uppercase tracking-widest text-sm shadow-md">Generar Recibo</button>
        </div>

        <!-- Receipt Mode -->
        <div id="receipt-view" class="hidden">
            <h1 id="r-comp-name" class="text-3xl header-font text-center mb-6 text-stone-800">Deli Cakesymas</h1>
            
            <div class="text-sm space-y-2 mb-6 bg-pink-50 p-4 rounded no-print">
                <p><strong>CLIENTE:</strong> <span id="r-name"></span></p>
                <p><strong>ENTREGA:</strong> <span id="r-delivery"></span></p>
            </div>

            <div id="r-items-display" class="space-y-4"></div>
            
            <div class="space-y-4 text-sm mt-6">
                <div class="flex justify-between font-bold text-lg border-t pt-2"><span>TOTAL:</span> <span id="r-total">$0.00</span></div>
                
                <div class="no-print grid grid-cols-2 gap-4">
                    <div class="p-3 font-bold text-stone-600 flex flex-col justify-center bg-stone-100 rounded">
                        <span class="text-[10px] text-stone-500 uppercase">Total Pagado:</span> 
                        <span id="r-total-paid" class="text-xl">$0.00</span>
                    </div>
                    <div class="p-3 font-bold text-pink-600 flex flex-col justify-center bg-pink-50 rounded border border-pink-100">
                        <span class="text-[10px] text-stone-500 uppercase">Balance:</span> 
                        <span id="r-balance" class="text-xl">$0.00</span>
                    </div>
                </div>
                
                <div class="p-4 border rounded no-print">
                    <p class="font-bold mb-2 uppercase text-[10px]">Métodos de Pago Aplicados:</p>
                    <div class="grid grid-cols-3 gap-2 text-xs mb-4">
                        <button type="button" class="pay-btn border-2 border-stone-200 rounded p-2 text-center text-stone-600 font-semibold" onclick="togglePayment(this, 'Cash')">CASH</button>
                        <button type="button" class="pay-btn border-2 border-stone-200 rounded p-2 text-center text-stone-600 font-semibold" onclick="togglePayment(this, 'Zelle')">ZELLE</button>
                        <button type="button" class="pay-btn border-2 border-stone-200 rounded p-2 text-center text-stone-600 font-semibold" onclick="togglePayment(this, 'Venmo')">VENMO</button>
                        <button type="button" class="pay-btn border-2 border-stone-200 rounded p-2 text-center text-stone-600 font-semibold" onclick="togglePayment(this, 'Credit Card')">CREDIT CARD</button>
                        <button type="button" class="pay-btn border-2 border-stone-200 rounded p-2 text-center text-stone-600 font-semibold" onclick="togglePayment(this, 'Apple Pay')">APPLE PAY</button>
                        <button type="button" class="pay-btn border-2 border-stone-200 rounded p-2 text-center text-stone-600 font-semibold" onclick="togglePayment(this, 'Check')">CHECK</button>
                    </div>

                    <!-- Dynamic Payment Amounts Container -->
                    <div id="payment-amounts-container" class="space-y-2 mt-4 hidden border-t pt-4">
                        <p class="font-bold mb-2 uppercase text-[10px] text-stone-500">Montos por Método:</p>
                        <!-- Inputs injected here via JS -->
                    </div>
                </div>
            </div>

            <!-- Dynamic Photos Section appended here during generation -->
            <div id="r-photos-section" class="mt-8"></div>

            <div class="grid grid-cols-2 gap-2 mt-8 no-print">
                <button onclick="document.getElementById('input-view').classList.remove('hidden'); document.getElementById('receipt-view').classList.add('hidden');" class="bg-stone-200 py-4 font-bold text-xs uppercase">Editar</button>
                <button onclick="window.print()" class="bg-stone-800 text-white py-4 font-bold text-xs uppercase">Imprimir / PDF</button>
            </div>
        </div>
    </div>

    <script>
        let items = [];
        let finalTotal = 0;
        let currentOrderKey = null;
        let selectedPayments = []; // Array of objects: { method: 'Cash', amount: 0, isDeposit: false }

        function togglePayment(btn, method) {
            const index = selectedPayments.findIndex(p => p.method === method);
            
            if (index > -1) {
                // Deselect: remove from array
                selectedPayments.splice(index, 1);
                btn.classList.remove('border-stone-800', 'text-stone-900', 'font-bold', 'bg-stone-100');
                btn.classList.add('border-stone-200', 'text-stone-600', 'font-semibold');
            } else {
                // Select: add to array with 0 amount
                selectedPayments.push({ method: method, amount: 0, isDeposit: false });
                btn.classList.remove('border-stone-200', 'text-stone-600', 'font-semibold');
                btn.classList.add('border-stone-800', 'text-stone-900', 'font-bold', 'bg-stone-100');
            }
            
            renderPaymentAmounts();
            updateBalances();
            saveOrder(true); // Silently save selection
        }

        function renderPaymentAmounts() {
            const container = document.getElementById('payment-amounts-container');
            
            if (selectedPayments.length === 0) {
                container.classList.add('hidden');
                container.innerHTML = `<p class="font-bold mb-2 uppercase text-[10px] text-stone-500">Montos por Método:</p>`;
                return;
            }

            container.classList.remove('hidden');
            
            let html = `<p class="font-bold mb-2 uppercase text-[10px] text-stone-500">Montos por Método:</p>`;
            selectedPayments.forEach((payment, index) => {
                html += `
                    <div class="flex flex-wrap items-center justify-between gap-2 mb-2 pb-2 border-b border-stone-100 last:border-0">
                        <label class="w-[30%] text-xs font-bold text-stone-700">
                            ${payment.method}
                            ${payment.isDeposit ? '<span class="hidden print:block text-[9px] text-pink-600 mt-1">(Depósito)</span>' : ''}
                        </label>
                        <input type="number" 
                               class="flex-1 min-w-[60px] p-2 border rounded bg-stone-50 text-right" 
                               placeholder="$0.00" 
                               value="${payment.amount || ''}" 
                               oninput="updatePaymentAmount(${index}, this.value)">
                        <label class="flex items-center gap-1 text-[9px] font-bold text-stone-500 uppercase no-print cursor-pointer shrink-0">
                            <input type="checkbox" class="accent-pink-500" ${payment.isDeposit ? 'checked' : ''} onchange="updatePaymentDeposit(${index}, this.checked)"> Depósito
                        </label>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function updatePaymentAmount(index, value) {
            selectedPayments[index].amount = parseFloat(value) || 0;
            updateBalances();
            saveOrder(true); // Silently save amounts
        }

        function updatePaymentDeposit(index, isDeposit) {
            selectedPayments[index].isDeposit = isDeposit;
            renderPaymentAmounts(); // Re-render to update the print label
            saveOrder(true);
        }

        function addItem() { items.push({ id: Date.now(), name: '', ing: 0, pkg: 0, labor: 0, diff: '1', photo: '' }); renderItems(); }

        function removeItem(index) {
            saveItems(); // Save current inputs before removing
            items.splice(index, 1);
            renderItems();
        }
        
        function renderItems() {
            // Photo functionality has been moved to the receipt page
            document.getElementById('items-list').innerHTML = items.map((item, i) => `
                <div class="p-3 border rounded bg-stone-50 space-y-1">
                    <div class="flex justify-between items-center">
                        <label>Producto</label>
                        <button type="button" onclick="removeItem(${i})" class="util-btn text-red-500 font-bold text-[10px] bg-red-100 rounded px-2">✕ Eliminar</button>
                    </div>
                    <input type="text" class="item-name w-full p-2 border rounded" value="${item.name}" placeholder="Ej: Pastel de Chocolate" onchange="saveItems()">
                    <div class="grid grid-cols-2 gap-2 mt-2">
                        <label>Ingredientes ($)</label><label>Empaque ($)</label>
                        <input type="number" class="item-ing p-2 border rounded" value="${item.ing}" onchange="saveItems()">
                        <input type="number" class="item-pkg p-2 border rounded" value="${item.pkg}" onchange="saveItems()">
                        
                        <label>Horas de Labor</label><label>Dificultad</label>
                        <input type="number" class="item-labor p-2 border rounded" value="${item.labor}" onchange="saveItems()">
                        <select class="item-diff p-2 border rounded" onchange="saveItems()">
                            <option value="1" ${item.diff=='1'?'selected':''}>Básico (1x)</option>
                            <option value="1.5" ${item.diff=='1.5'?'selected':''}>Técnico (1.5x)</option>
                            <option value="2" ${item.diff=='2'?'selected':''}>Extra (2x)</option>
                        </select>
                    </div>
                </div>
            `).join('');
        }

        function saveItems() {
            document.querySelectorAll('#items-list > div').forEach((div, i) => {
                items[i].name = div.querySelector('.item-name').value;
                items[i].ing = parseFloat(div.querySelector('.item-ing').value) || 0;
                items[i].pkg = parseFloat(div.querySelector('.item-pkg').value) || 0;
                items[i].labor = parseFloat(div.querySelector('.item-labor').value) || 0;
                items[i].diff = div.querySelector('.item-diff').value;
            });
        }

        function generateReceipt() {
            saveItems();
            const compName = document.getElementById('comp-name').value || "Deli Cakesymas";
            document.getElementById('r-comp-name').innerText = compName;
            document.getElementById('r-name').innerText = document.getElementById('cust-name').value || "Cliente";
            document.getElementById('r-delivery').innerText = document.getElementById('delivery-date').value || "Sin fecha";
            
            let total = 0;
            
            // Build Receipt summary block
            let html = '<div class="border-b border-stone-300 pb-4"><p class="font-bold uppercase text-[10px] mb-3 text-stone-500">Resumen de Pedido</p>';
            items.forEach(it => {
                let sub = (it.ing + it.pkg + (it.labor * 50)) * parseFloat(it.diff);
                total += sub;
                html += `<div class="flex justify-between text-sm py-1"><span>${it.name || 'Producto Sin Nombre'}</span> <span class="font-bold">$${sub.toFixed(2)}</span></div>`;
            });
            html += '</div>';

            // Calculate final total including miles & overhead
            const overhead = parseFloat(document.getElementById('overhead').value) || 0;
            const delivery = (parseFloat(document.getElementById('miles').value) || 0) * 0.725;
            finalTotal = total + overhead + delivery;
            
            if (overhead > 0) html += `<div class="flex justify-between text-sm py-1 border-b border-stone-100"><span>Gastos Indirectos</span> <span>$${overhead.toFixed(2)}</span></div>`;
            if (delivery > 0) html += `<div class="flex justify-between text-sm py-1 border-b border-stone-100"><span>Delivery (Millas)</span> <span>$${delivery.toFixed(2)}</span></div>`;

            document.getElementById('r-items-display').innerHTML = html;
            document.getElementById('r-total').innerText = `$${finalTotal.toFixed(2)}`;
            updateBalances();

            // Build individual item pages for photos
            let photosHtml = '';
            items.forEach((it, i) => {
                let sub = (it.ing + it.pkg + (it.labor * 50)) * parseFloat(it.diff);
                const hasPhoto = !!it.photo;
                photosHtml += `
                    <div id="photo-container-${i}" class="mt-8 pt-6 border-t-2 border-dashed border-stone-200 ${hasPhoto ? 'print-page' : 'print:hidden'}">
                        <h2 class="text-3xl header-font text-center text-stone-800 hidden print:block">${compName}</h2>
                        <h3 class="text-xl font-bold text-center mt-4 text-stone-700">${it.name || 'Producto'}</h3>
                        <p class="text-center text-stone-500 font-bold mb-4">Precio: $${sub.toFixed(2)}</p>
                        
                        <div class="no-print">
                            <input type="file" accept="image/*" class="hidden" id="r-file-${i}" onchange="handlePhotoReceipt(${i}, this)">
                            <button type="button" onclick="document.getElementById('r-file-${i}').click()" class="w-full bg-stone-200 text-stone-600 font-bold uppercase text-[10px] py-3 rounded">📸 Agregar Foto de Producto Terminado</button>
                        </div>
                        
                        <div id="photo-display-${i}" class="mt-4 text-center">
                            ${hasPhoto ? `<img src="${it.photo}" class="w-full rounded-xl shadow-lg border border-stone-200 object-contain max-h-[60vh] mx-auto">` : '<p class="text-stone-400 italic text-xs no-print">Sin foto añadida</p>'}
                        </div>
                    </div>
                `;
            });
            document.getElementById('r-photos-section').innerHTML = photosHtml;
            
            document.getElementById('input-view').classList.add('hidden');
            document.getElementById('receipt-view').classList.remove('hidden');
        }

        function handlePhotoReceipt(i, input) {
            const file = input.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = e => { 
                items[i].photo = e.target.result; 
                
                // Update photo display
                document.getElementById(`photo-display-${i}`).innerHTML = `<img src="${items[i].photo}" class="w-full rounded-xl shadow-lg border border-stone-200 object-contain max-h-[60vh] mx-auto">`;
                
                // Make sure it prints on its own page
                const container = document.getElementById(`photo-container-${i}`);
                container.classList.add('print-page');
                container.classList.remove('print:hidden');
                
                // Automatically save silently when a photo is added
                saveOrder(true);
            };
            reader.readAsDataURL(file);
        }

        function updateBalances() {
            // Calculate total paid across all selected methods
            const totalPaid = selectedPayments.reduce((sum, payment) => sum + (parseFloat(payment.amount) || 0), 0);
            
            document.getElementById('r-total-paid').innerText = `$${totalPaid.toFixed(2)}`;
            document.getElementById('r-balance').innerText = `$${(finalTotal - totalPaid).toFixed(2)}`;
        }

        function saveOrder(silent = false) {
            saveItems();
            const name = document.getElementById('cust-name').value || "Pedido";
            
            if (!currentOrderKey) {
                currentOrderKey = name + "_" + Date.now();
            }

            const orders = JSON.parse(localStorage.getItem('bakeryOrders') || '{}');
            orders[currentOrderKey] = { 
                items, 
                name, 
                comp: document.getElementById('comp-name').value,
                payments: selectedPayments // Save payment selections and amounts
            };
            
            try {
                localStorage.setItem('bakeryOrders', JSON.stringify(orders));
                if (!silent) {
                    alert("Guardado Exitosamente"); 
                    refreshList();
                }
            } catch (e) {
                if (!silent) alert("Error al guardar: Probablemente la foto es demasiado pesada para la memoria local de tu dispositivo.");
            }
        }

        function loadOrder() {
            const key = document.getElementById('load-select').value;
            if(!key) return;
            currentOrderKey = key;
            const order = JSON.parse(localStorage.getItem('bakeryOrders'))[key];
            items = order.items; 
            document.getElementById('comp-name').value = order.comp || "Deli Cakesymas"; 
            document.getElementById('cust-name').value = order.name; 
            
            // Load payment selections and amounts
            selectedPayments = order.payments || [];
            
            // Reset all buttons visually first
            document.querySelectorAll('.pay-btn').forEach(btn => {
                btn.classList.remove('border-stone-800', 'text-stone-900', 'font-bold', 'bg-stone-100');
                btn.classList.add('border-stone-200', 'text-stone-600', 'font-semibold');
                
                // Re-apply selection visually
                const methodText = btn.innerText.trim();
                if(selectedPayments.some(p => p.method === methodText)) {
                    btn.classList.remove('border-stone-200', 'text-stone-600', 'font-semibold');
                    btn.classList.add('border-stone-800', 'text-stone-900', 'font-bold', 'bg-stone-100');
                }
            });

            renderPaymentAmounts();
            renderItems();
            
            // If we load while in receipt view, recalculate
            if(!document.getElementById('receipt-view').classList.contains('hidden')) {
                generateReceipt();
            }
        }

        function refreshList() {
            const orders = JSON.parse(localStorage.getItem('bakeryOrders') || '{}');
            document.getElementById('load-select').innerHTML = '<option value="">Cargar...</option>' + Object.keys(orders).map(k => {
                const label = orders[k].name ? `${orders[k].name}` : k;
                return `<option value="${k}">${label}</option>`;
            }).join('');
        }

        // Initialize App
        addItem(); 
        refreshList();
    </script>
</body>
</html>
